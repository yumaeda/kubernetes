apiVersion: apps/v1
kind: Deployment
metadata:
  name: sakabas-nextjs
  namespace: sakabas-nextjs
  labels:
    app: sakabas-nextjs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sakabas-nextjs
  template:
    metadata:
      labels:
        app: sakabas-nextjs
    spec:
      serviceAccountName: sakabas-nextjs
      containers:
        - name: sakabas-nextjs
          image: your-registry/sakabas-nextjs:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sakabas-nextjs-config
                  key: NEXT_PUBLIC_API_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sakabas-nextjs-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sakabas-api 80; do echo "Waiting for sakabas-api..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
