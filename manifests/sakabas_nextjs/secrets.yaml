apiVersion: v1
kind: Secret
metadata:
  name: sakabas-nextjs-secrets
  namespace: sakabas-nextjs
  labels:
    app: sakabas-nextjs
type: Opaque
stringData:
  # Add your secrets here as key-value pairs
  # DATABASE_URL: "postgresql://user:password@host:5432/db"
  # API_SECRET_KEY: "your-secret-key"
  # JWT_SECRET: "your-jwt-secret"
  # Replace the values above with actual secrets
  # Do NOT commit actual secrets to version control
  # Use kubectl create secret instead:
  # kubectl create secret generic sakabas-nextjs-secrets \
  #   --from-literal=DATABASE_URL=postgresql://... \
  #   --from-literal=API_SECRET_KEY=... \
  #   -n sakabas-nextjs
